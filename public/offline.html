<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're Offline – Focus Flow</title>
    <meta name="theme-color" content="#0a0a0f" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a0f;
        color: #e4e4e7;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      .icon-wrap {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: rgba(163, 230, 53, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      svg { display: block; }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.9rem;
        color: #71717a;
        max-width: 280px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(163, 230, 53, 0.15);
        color: #a3e635;
        border: 1px solid rgba(163, 230, 53, 0.25);
        padding: 0.65rem 1.5rem;
        border-radius: 999px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
        text-decoration: none;
      }

      .btn:hover { background: rgba(163, 230, 53, 0.22); transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }

      .status {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #52525b;
      }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 0.4rem;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="icon-wrap">
      <!-- wifi-off icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
        stroke="#a3e635" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#a3e635" stroke="none"/>
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>No internet connection detected. Check your connection and try again — your data is safely stored on this device.</p>

    <button class="btn" onclick="tryReload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>

    <p class="status">
      <span class="dot"></span>Waiting for connection…
    </p>

    <script>
      function tryReload() {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          const btn = document.querySelector('.btn');
          btn.textContent = 'Still offline…';
          setTimeout(() => {
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Try Again';
          }, 1500);
        }
      }

      // Auto-redirect when connection is restored
      window.addEventListener('online', () => {
        window.location.href = '/';
      });
    </script>
  </body>
</html>
